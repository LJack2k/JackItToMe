name: Publish to CurseForge

# Two triggers:
#   - Auto: fires when a GitHub Release is published (i.e. release.yml just
#     finished creating it). This is the normal chain — push a tag, release
#     happens, this workflow fires automatically.
#   - Manual: workflow_dispatch with a tag input. Use this to retry a single
#     failed publish without re-tagging or re-running the whole release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.4.0)'
        required: true
        type: string

permissions:
  contents: read    # for `gh release download` to read the release asset

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        # Tag source depends on trigger:
        #   - release.published → github.event.release.tag_name (e.g. "v0.4.0")
        #   - workflow_dispatch → inputs.tag (we require the "v" prefix here too
        #     for consistency)
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"  >> "$GITHUB_OUTPUT"

      - name: Download jar from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --pattern '*.jar'
          # release.yml only attaches the non-sources jar, so dist/ ends up
          # with exactly one file. Listing here for log clarity.
          ls -la dist

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1552621
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: dist/*.jar

          name: JackItToMe-neoforge-1.21.1-${{ steps.tag.outputs.version }}.jar
          version: ${{ steps.tag.outputs.version }}
          version-type: release

          loaders: neoforge
          game-versions: 1.21.1
          java: 21

          # CurseForge-only dependency entries — Modrinth slugs live in
          # publish-modrinth.yml. mc-publish ignores curly-brace pairs for
          # platforms it doesn't have credentials for, but splitting per
          # workflow keeps each file readable.
          dependencies: |
            jei(required){curseforge:238222}
            applied-energistics-2(optional){curseforge:223794}
            refined-storage(optional){curseforge:243076}

          changelog: |
            See the [release notes on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}).
