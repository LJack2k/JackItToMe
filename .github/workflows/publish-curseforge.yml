name: Publish to CurseForge

# Two triggers:
#   - Auto: fires when the "Release" workflow completes successfully on a
#     tag ref. We use workflow_run (not release:published) because the
#     Release event triggered by GITHUB_TOKEN doesn't fire downstream
#     workflows — GitHub filters it as an anti-recursion safety. Hooking
#     into the workflow's completion bypasses that filter cleanly.
#   - Manual: workflow_dispatch with a tag input. Use this to retry a
#     single failed publish without re-tagging or re-running the whole
#     release.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.4.1)'
        required: true
        type: string

permissions:
  contents: read    # for `gh release download` to read the release asset

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gate workflow_run on success + tag-shaped head_branch. workflow_dispatch
    # is always allowed through (manual re-runs need to work even when the
    # last release failed). head_branch on a tag-triggered upstream is the
    # tag name itself (e.g. "v0.4.1") — sanity-check it starts with 'v' to
    # rule out accidental triggers from non-release contexts.
    if: ${{ github.event_name == 'workflow_dispatch' ||
            (github.event.workflow_run.conclusion == 'success' &&
             startsWith(github.event.workflow_run.head_branch, 'v')) }}
    steps:
      - name: Resolve tag
        id: tag
        # Tag source depends on trigger:
        #   - workflow_run     → github.event.workflow_run.head_branch (e.g. "v0.4.1")
        #   - workflow_dispatch → inputs.tag
        run: |
          TAG="${{ inputs.tag || github.event.workflow_run.head_branch }}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"  >> "$GITHUB_OUTPUT"

      - name: Download jar from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --pattern '*.jar'
          # release.yml only attaches the non-sources jar, so dist/ ends up
          # with exactly one file. Listing here for log clarity.
          ls -la dist

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1552621
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: dist/*.jar

          name: JackItToMe-neoforge-1.21.1-${{ steps.tag.outputs.version }}.jar
          version: ${{ steps.tag.outputs.version }}
          version-type: release

          loaders: neoforge
          game-versions: 1.21.1
          java: 21

          # CurseForge-only dependency entries — Modrinth slugs live in
          # publish-modrinth.yml. mc-publish ignores curly-brace pairs for
          # platforms it doesn't have credentials for, but splitting per
          # workflow keeps each file readable.
          #
          # All three recipe viewers are OPTIONAL — the mod works with any one
          # of them (or none). JEI was required pre-0.5.0; EMI/REI added in 0.5.0.
          dependencies: |
            jei(optional){curseforge:238222}
            emi(optional){curseforge:580555}
            roughly-enough-items(optional){curseforge:310111}
            applied-energistics-2(optional){curseforge:223794}
            refined-storage(optional){curseforge:243076}

          changelog: |
            See the [release notes on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}).
