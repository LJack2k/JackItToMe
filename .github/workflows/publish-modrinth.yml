name: Publish to Modrinth

# Same trigger model as publish-curseforge.yml — see comments there for
# why workflow_run is used instead of release:published. To retry just
# Modrinth after a failure: Actions → Publish to Modrinth → Run workflow
# → enter the tag (e.g. v0.4.1).
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.4.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' ||
            (github.event.workflow_run.conclusion == 'success' &&
             startsWith(github.event.workflow_run.head_branch, 'v')) }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ inputs.tag || github.event.workflow_run.head_branch }}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"  >> "$GITHUB_OUTPUT"

      - name: Download jar from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --pattern '*.jar'
          ls -la dist

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Project ID (immutable internal ID). The slug is "jackittome";
          # using the ID means renaming the slug doesn't break the workflow.
          modrinth-id: wlqlNG8s
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: dist/*.jar

          name: JackItToMe-neoforge-1.21.1-${{ steps.tag.outputs.version }}.jar
          version: ${{ steps.tag.outputs.version }}
          version-type: release

          loaders: neoforge
          game-versions: 1.21.1
          java: 21

          # Modrinth-only dependency entries — CurseForge IDs live in
          # publish-curseforge.yml. Slugs come from each mod's Modrinth URL
          # (modrinth.com/mod/<slug>).
          dependencies: |
            jei(required){modrinth:jei}
            ae2(optional){modrinth:ae2}
            refined-storage(optional){modrinth:refined-storage}

          changelog: |
            See the [release notes on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}).
