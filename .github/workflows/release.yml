name: Release

# Fires when you push a git tag starting with "v" — e.g. v0.4.0.
# Workflow: bump mod_version in gradle.properties, commit, then:
#   git tag v0.4.0
#   git push --tags
#
# This workflow ONLY builds the jar and creates the GitHub Release. The
# subsequent CurseForge + Modrinth publishes are separate workflows that
# trigger on the "release: published" event (see publish-curseforge.yml
# and publish-modrinth.yml). That split lets you re-run a single platform
# manually if one fails without rebuilding or re-uploading to the others.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # for creating the GitHub Release and attaching the jar

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the mod
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

      - name: Compute version from tag
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        # GITHUB_REF_NAME is e.g. "v0.4.0"; we strip the "v" → "0.4.0"

      - name: Create GitHub Release
        # mc-publish creates the release with the jar attached. Omitting
        # curseforge-id and modrinth-id makes it skip those platforms — only
        # the GitHub Release step runs here. The separate publish workflows
        # pick up from there.
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: |
            **/build/libs/!(*-sources).jar

          name: JackItToMe-neoforge-1.21.1-${{ steps.ver.outputs.value }}.jar
          version: ${{ steps.ver.outputs.value }}
          version-type: release

          loaders: neoforge
          game-versions: 1.21.1
          java: 21

          changelog: |
            See the [release notes on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}).

            Full changelog: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
