modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://example.com"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''
# Icon shown in the in-game Mods list and on CurseForge / Modrinth.
# Path is relative to the jar's resources root, so this points at
# src/main/resources/icon.png.
logoFile = "icon.png"
# logoBlur = true is fine for a smooth/rendered icon. Set false for pixel-art.
logoBlur = true

# --- Required ---
[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# JEI is required client-side because that's where the button lives.
# The mod still works on dedicated servers (it just receives packets from clients with JEI).
[[dependencies.${mod_id}]]
modId = "jei"
type = "required"
versionRange = "[19.0.0,)"
ordering = "AFTER"
side = "CLIENT"

# --- Optional integrations ---
[[dependencies.${mod_id}]]
modId = "ae2"
type = "optional"
versionRange = "[19.0.0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "refinedstorage"
type = "optional"
versionRange = "[2.0.0,)"
ordering = "AFTER"
side = "BOTH"
