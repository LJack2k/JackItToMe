<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <!-- Rounded Minecraft-grass-green background -->
  <rect width="512" height="512" rx="96" fill="#3D9142"/>

  <!-- Inner darker frame for chunky Minecraft feel -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="#2B6A2F" stroke-width="16"/>

  <!-- Big bold downward arrow (drawn first so the cube overlaps it) -->
  <path d="M 176 230 L 176 320 L 100 320 L 256 488 L 412 320 L 336 320 L 336 230 Z"
        fill="#FFFFFF" stroke="#1B1B1B" stroke-width="7" stroke-linejoin="round"/>

  <!-- Item cube - bigger, sitting on top of (overlapping) the arrow -->
  <g transform="translate(256, 200)">
    <!-- top face -->
    <polygon points="0,-130 130,-58 0,14 -130,-58" fill="#FFC857"/>
    <!-- left face -->
    <polygon points="-130,-58 0,14 0,158 -130,86" fill="#D89A2A"/>
    <!-- right face -->
    <polygon points="130,-58 0,14 0,158 130,86" fill="#A77520"/>
    <!-- outline -->
    <polygon points="0,-130 130,-58 130,86 0,158 -130,86 -130,-58" fill="none" stroke="#1B1B1B" stroke-width="7" stroke-linejoin="round"/>
    <line x1="0" y1="14" x2="0" y2="158" stroke="#1B1B1B" stroke-width="7"/>
    <line x1="0" y1="14" x2="130" y2="-58" stroke="#1B1B1B" stroke-width="7"/>
    <line x1="0" y1="14" x2="-130" y2="-58" stroke="#1B1B1B" stroke-width="7"/>
  </g>
</svg>
